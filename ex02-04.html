<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @font-face {
        font-family: "MyFont";
        src: url("./ulsanjunggu.fonts") format("truetype");
      }
      /* format("truetype"); OTF 일때 */
      ul {
        list-style-type: none;
      }
      ul li {
        background-color: rgb(81, 155, 240);
        color: rgb(0, 0, 0);
        margin: 3px;
      }
    </style>
  </head>
  <body>
    <h1>input 응용</h1>
    <hr />
    <a href="index.html">홈으로</a><br /><br />

    <h1 style="font-family: MyFont">리스트정리</h1>
    <h2 style="font-family: ulsanjunggu, Arial, Helvetica, sans-serif">
      순서가 있는 리스트(Ordered list, list item)
    </h2>

    <h3><strong>커피</strong></h3>
    <!-- ol 의 속성 type, start, value -->
    <ol type="1" start="5">
      <li style="background-color: aqua">아메리카노</li>
      <li style="color: blue">아이스아메리카노</li>
      <li value="1">라떼</li>
      <li style="background-color: aqua">아샷추</li>
      <li>카푸치노</li>
    </ol>
    <h2 style="font-family: ulsanjunggu, Arial, Helvetica, sans-serif">
      순서가 없는 리스트 (Unordered list, list item)
    </h2>
    <ul>
      <li>사과</li>
      <li>복숭아</li>
      <li>수박</li>
      <li>포토</li>
      <li>바나나</li>
    </ul>
  </body>
</html>
