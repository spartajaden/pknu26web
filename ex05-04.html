<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>float 응용</title>
    <style>
      :root {
        --myred1: rgb(255, 74, 74);
        --myred2: rgb(253, 141, 141);
        --myred3: rgb(255, 232, 232);
        --mygreen1: rgb(0, 255, 0);
        --mygreen2: rgb(181, 253, 181);
        --mygreen3: rgb(241, 255, 241);
        --myblue1: rgb(21, 114, 255);
        --myblue2: rgb(137, 184, 255);
        --myblue3: rgb(229, 239, 255);
        --mypink1: rgb(255, 120, 142);
        --mypink2: rgb(255, 181, 194);
        --mypink3: pink;
        --myyellow1: rgb(251, 255, 20);
        --myyellow1: rgb(252, 253, 157);
        --myyellow1: rgb(255, 255, 227);
      }
      header,
      footer {
        width: 300px;
        height: 40px;
        background-color: var(--myblue2);
        border: 5px solid var(--myblue1);
        box-sizing: border-box;
      }
      footer {
        background-color: var(--mypink2);
        border: 5px solid var(--mypink1);
      }
      nav {
        width: 50px;
        height: 250px;
        background-color: var(--mygreen2);
        background-color: var(--mygreen1);
        box-sizing: border-box;
        float: left;
        /* opacity: 0.4; */
      }
      main {
        width: 250px;
        margin-left: 50px;
      }
      article {
        height: 50px;
        background-color: var(--myyellow2);
        border: 5px solid var(--myyellow1);
        box-sizing: border-box;
      }
      section {
        height: 200px;
        background-color: var(--myred2);
        border: 5px solid var(--myred1);
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <h1>float 응용(레이아웃)</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <!-- div.box>header{header}>div>nav{nav}+main>article{article}+section{section}^^footer{footer} -->
    <div class="box">
      <header>header</header>
      <div>
        <nav>nav</nav>
        <main>
          <article>article</article>
          <section>section</section>
        </main>
      </div>
      <footer>footer</footer>
    </div>
  </body>
</html>
