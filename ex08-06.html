<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script>

      document.addEventListener("DOMContentLoaded",()=> {
        const dollar = +prompt("환전할 달러를 입력해주세요.", 1);
        // console.log(typeof dollar, dollar);
        const ex = 1500
        const won =  dollar * ex
        const list = `<h2>환전하실 ${won}달러는 ${won}원 입니다.</h2>`; 
        
        // document.write() // 이전 방식 권장안함
        document.body.innerHTML = list;
        // documnet.body.textContent = list
      });
    </script>
    </head>
   <body>
      <h1>반가워요!!!!</h1>
   </body>    
</html>
