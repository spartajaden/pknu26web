<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>함수표현식으로 게임</title>
</head>
<body>
    영웅의 이름을 입력하세요 <input type="heroName" /> <br />
    영웅의 레벨을 입력하세요 <input type="level" id="1부터 20까지" /> <br />
    영웅의 스킬을 입력하세요 <input type="skill" id="skill" /> <br />
    
    <select id="skill">
      <option value="fire">fire</option>
      <option value="ice">ice</option>
      <option value="slow">slow</option>
    </select>
    <br />
    <button onclick="run()">실행</button>
    <hr />
    <div id="output"></div>
    <br />

    <script>
        const lol = function(heroName, level = 7, cb) {

            if (cb === "fire") cb = fire;
            else if (cb === "ice") cb = ice;
            else if (cb === "slow") cb = slow;

            document.write("=======================<br>");        
            document.write(`${heroName}님이 ${level}레벨이 되었습니다.<br>`);        
            document.write("=======================<br>");

            if (level >= 6) {
                document.write(`${heroName}님이 궁극기를 씁니다.<br>`);
                cb(level);
            } else {
                document.write(`${heroName}님이 깨작 평타를 때립니다.<br>`);
            }
        }

            function fire(ff) {
               for (let i = 1; i < ff + 1; i++) {
                  document.write(`${ff}레벨 이어서 ${i}개 메테오를 던집니다.<br>`);
               }
            }
            function ice(ii) {
               for (let i = 1; i < ii; i++) {
                  document.write(`${ii}레벨 이어서 ${i * 2}개 얼음을 던집니다.<br>`);
               }
            }
            function slow(ss) {
               for (let i = ss; 0 < i; i--) {
                  document.write(`${ss}레벨 이어서 다리를 공격하여 이동속도를 ${i}% 줄입니다.<br>`);
              }
            }

        function ctext() {
        const textArea = document.querySelector("#heroname");
        const disp = document.querySelector("#level");
        disp.textContent = `캐릭터 : ${textArea.value.length}`;
      }
        lol("제이든", 11, fire);
    </script>
  </body>
</html>
