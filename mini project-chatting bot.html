<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chatting bot</title>
    <style>
    .chat-container {
        background-color: white;
        width: 500px;
        height: 400px;
        margin: auto;
        padding: 1rem 3rem 0 3rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        transform: translateY(50%);
        border-radius: 20px;
    }
    .message {
        display: flex;
        flex-direction: column;
    }
    .message {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
    }
    .message.bot {
        align-items: flex-start;
    }
    .message.user {
        align-items: flex-end;
    }
    .name {
        font-size: 0.8rem;
        color: #555;
        margin: 0 10px 2px;
    }
    .bubble {
        max-width: 300px;
        background-color: rgb(227, 195, 113);
        padding: 0.7rem 2rem;
        border-radius: 20px;
        word-break: break-word;
    }
    .user .bubble {
        background-color: yellowgreen;
        text-align: right;
    }
    .user .name {
        text-align: right;
    }
    .chat-container::-webkit-scrollbar {
        background-color: aliceblue;
        border-radius: 0 5px 5px 0;
        width: 30px;
    }
    .chat-container::-webkit-scrollbar-thumb {
        background-color: rgb(89, 156, 233);
        border-radius: 6px;
    }
    .input-area {
        display: flex;
        gap: 10px;
        padding: 10px 0;
    }

    #userInput {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
    }

    #sendBtn {
        padding: 10px 20px;
        border-radius: 10px;
        border: none;
        background-color: gold;
        cursor: pointer;
    }
    .delete-btn {
        margin-top: 5px;
        background: none;
        border: none;
        color: red;
        cursor: pointer;
        font-size: 0.7rem;
    }
    </style>
</head>
<body>
    <div
</body>
</html>
