<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>text-shadow</title>
    <style>
      h2 {
        font-size: 60px;
      }
      .shadow1 {
        color: red;
        text-shadow: 10px 10px 5px #555;
      }
      .shadow2 {
        text-shadow: 5px 5px 3px #ffa500;
        letter-spacing: 8px;
      }
      .shadow3 {
        color: white;
        text-shadow: 7px -7px 20px #000;
        letter-spacing: 10px;
      }
    </style>
  </head>
  <body>
    <h1>text-shadow</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <h1 class="shadow1">HTML</h1>
    <h1 class="shadow2">CSS</h1>
    <h1 class="shadow3">JavaScript</h1>
  </body>
</html>
