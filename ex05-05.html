<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>그라데이션</title>
    <style>
      div {
        width: 500px;
        height: 300px;
        border: 1px solid #ccc;
        margin: 30px;
      }
      .grad1 {
        background: repeating-radial-gradient(
          yellow,
          yellow 20px,
          red 20px,
          red 40px
        );
      }
      .grad2 {
        background: repeating-linear-gradient(
          green,
          green 10%,
          blue 20%,
          blue 30%
        );
      }
      .grad3 {
        background: radial-gradient(white, yellow, red);
      }
      .grad4 {
        background: linear-gradient(to left, white, yellow, red);
      }
    </style>
  </head>
  <body>
    <h1>원형그라데이션</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
  </body>
</html>
