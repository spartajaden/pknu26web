<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주사위 확률 계산</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .input-section {
        margin-bottom: 20px;
      }
      input {
        padding: 8px;
        margin-right: 10px;
        width: 150px;
      }
      button {
        padding: 8px 16px;
        background-color: #4CAF50;
        color: white;
        border: none;
        cursor: pointer;
      }
      button:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
      }
      table {
        border-collapse: collapse;
        margin-bottom: 20px;
        width: 100%;
        max-width: 600px;
      }
      th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
      }
      th {
        background-color: #f2f2f2;
      }
      .graph-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 600px;
        border: 1px solid #ddd;
        padding: 10px;
        box-sizing: border-box;
      }
      .bar-row {
        display: flex;
        align-items: center;
        margin-bottom: 5px;
      }
      .bar-label {
        width: 20px;
        text-align: center;
        font-weight: bold;
      }
      .bar {
        height: 20px;
        background-color: #2196F3;
        margin-left: 10px;
        position: relative;
      }
      .bar:nth-child(1) { background-color: #FF5722; }
      .bar:nth-child(2) { background-color: #4CAF50; }
      .bar:nth-child(3) { background-color: #FFC107; }
      .bar:nth-child(4) { background-color: #9C27B0; }
      .bar:nth-child(5) { background-color: #00BCD4; }
      .bar:nth-child(6) { background-color: #795548; }
      .loading {
        color: #666;
        font-style: italic;
      }
      @media (max-width: 600px) {
        body {
          margin: 10px;
        }
        table {
          font-size: 14px;
        }
        .graph-container {
          height: 150px;
        }
      }
    </style>
  </head>
  <body>
    <h1>주사위 10만회 던지기 확률 계산</h1>
    <div class="input-section">
      <label for="rolls">던지기 회수:</label>
      <input type="number" id="rolls" value="100000" min="1" />
      <button id="runBtn">실행</button>
    </div>
    <div id="status"></div>
    <table id="resultsTable">
      <thead>
        <tr>
          <th>숫자</th>
          <th>출현 횟수</th>
          <th>확률 (%)</th>
          <th>기대값 (%)</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>1</td><td>0</td><td>0.00</td><td>16.67</td></tr>
        <tr><td>2</td><td>0</td><td>0.00</td><td>16.67</td></tr>
        <tr><td>3</td><td>0</td><td>0.00</td><td>16.67</td></tr>
        <tr><td>4</td><td>0</td><td>0.00</td><td>16.67</td></tr>
        <tr><td>5</td><td>0</td><td>0.00</td><td>16.67</td></tr>
        <tr><td>6</td><td>0</td><td>0.00</td><td>16.67</td></tr>
      </tbody>
    </table>
    <div class="graph-container" id="graphContainer">
      <div class="bar-row">
        <div class="bar-label">1</div>
        <div class="bar" data-number="1" style="width: 0%;"></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">2</div>
        <div class="bar" data-number="2" style="width: 0%;"></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">3</div>
        <div class="bar" data-number="3" style="width: 0%;"></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">4</div>
        <div class="bar" data-number="4" style="width: 0%;"></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">5</div>
        <div class="bar" data-number="5" style="width: 0%;"></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">6</div>
        <div class="bar" data-number="6" style="width: 0%;"></div>
      </div>
    </div>
    <script>
      const runBtn = document.getElementById('runBtn');
      const rollsInput = document.getElementById('rolls');
      const statusDiv = document.getElementById('status');
      const tableBody = document.querySelector('#resultsTable tbody');
      const graphContainer = document.getElementById('graphContainer');
      const expectedProb = 16.67;

      runBtn.addEventListener('click', () => {
        const rolls = parseInt(rollsInput.value);
        if (isNaN(rolls) || rolls < 1) {
          alert('회수는 1 이상의 정수를 입력하세요.');
          return;
        }
        runSimulation(rolls);
      });

      function runSimulation(rolls) {
        runBtn.disabled = true;
        statusDiv.textContent = '로딩 중...';
        statusDiv.className = 'loading';

        // Reset counts
        const counts = [0, 0, 0, 0, 0, 0];

        // Simulate dice throws
        for (let i = 0; i < rolls; i++) {
          const roll = Math.floor(Math.random() * 6) + 1;
          counts[roll - 1]++;
        }

        // Update table
        const rows = tableBody.querySelectorAll('tr');
        rows.forEach((row, index) => {
          const cells = row.querySelectorAll('td');
          const count = counts[index];
          const prob = (count / rolls * 100).toFixed(2);
          cells[1].textContent = count;
          cells[2].textContent = prob;
        });

        // Update graph
        const bars = graphContainer.querySelectorAll('.bar');
        bars.forEach((bar, index) => {
          const prob = (counts[index] / rolls * 100);
          const heightPercent = (prob / expectedProb * 100).toFixed(2);
          bar.style.height = heightPercent + '%';
        });

        statusDiv.textContent = '완료되었습니다.';
        statusDiv.className = '';
        runBtn.disabled = false;
      }
    </script>
  </body>
</html>
