<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>클릭</title>
    <style>
      h1 {
        font-size: 2rem;
      }
    </style>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        let ct = 0;
        const h1 = document.createElement("h1");
        document.body.append(h1);
        h1.textContent = `클릭횟수 : 0`;
        h1.style.userSelect = "none"; // 마우스 선택 방지
        h1.addEventListener("contextmenu", (e) => {
          e.preventDefault(); // 우클릭방지
        });
        h1.addEventListener("click", () => {
          h1.textContent = `클릭횟수 : ${++ct}`;
        });
      });
    </script>
  </head>
  <body></body>
</html>
