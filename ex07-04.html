<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      #box {
        display: flex;
        gap: 10px;
        border: 3px solid #ccc;
      }
      #box > div {
        /* width: 200px; */
        height: 200px;
      }
      #box > div:nth-of-type(1) {
        background-color: rgb(87, 226, 231);
        color: white;
        flex: 1 1 200px;
      }
      #box > div:nth-of-type(2) {
        background-color: rgb(216, 235, 110);
        flex: 1 2 200px;
      }
      #box > div:nth-of-type(3) {
        background-color: rgb(73, 247, 116);
        flex: 1 3 200px;
      }
    </style>
  </head>
  <body>
    <h1></h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <div id="box">
      <div>1</div>
      <div>2</div>
      <div>3</div>
    </div>
  </body>
</html>
