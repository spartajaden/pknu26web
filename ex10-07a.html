<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
  </head>
  <body>
    <h1 id="count">글자수 : 0</h1>
    <textarea
      name=""
      id="text"
      cols="40"
      row="20"
      maxlength="200"
      onkeyup="ctext()"
    ></textarea>

    <script>
      const textArea = document.querySelector("#text");
      const ctext = () => {
        const disp = document.querySelector("#count");
        disp.textContent = `글자수 : ${textArea.value.length}`;
      };
      textArea.addEventListener("keyup", ctext);
    </script>
  </body>
</html>
